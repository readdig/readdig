name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

# Serialize releases so concurrent runs can't race on the shared floating
# Docker tags (latest / major / minor). Never cancel a release mid-flight.
concurrency:
  group: ${{ github.workflow }}-release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  APP_IMAGE_NAME: ${{ github.repository }}/app
  API_IMAGE_NAME: ${{ github.repository }}/api

jobs:
  # Prepare version info for all jobs
  prepare:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      build_date: ${{ steps.version.outputs.BUILD_DATE }}
      build_ref: ${{ steps.version.outputs.BUILD_REF }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          # Normalize to a leading 'v' so tags are consistent (e.g. v1.2.3)
          case "$VERSION" in
            v*) ;;
            *) VERSION="v${VERSION}" ;;
          esac

          # Resolve which commit every job should build:
          # - tag push: the commit the tag points to (github.sha).
          # - manual dispatch: the named tag if it already exists (re-release),
          #   otherwise the commit the workflow was dispatched from.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null; then
            TARGET="refs/tags/${VERSION}"
          else
            TARGET="${{ github.sha }}"
          fi
          # Pin to a concrete commit SHA so checkout and the VCS_REF label are
          # deterministic and consistent across every job.
          BUILD_REF=$(git rev-parse "${TARGET}^{commit}")

          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "BUILD_REF=${BUILD_REF}" >> $GITHUB_OUTPUT

  # ============================================================
  # App Image Builds
  # ============================================================
  build-app-amd64:
    name: Build App (amd64)
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.build_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push App image (amd64)
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.APP_IMAGE_NAME }}:${{ needs.prepare.outputs.version }}-amd64
          cache-from: type=gha,scope=app-amd64
          cache-to: type=gha,mode=max,scope=app-amd64
          platforms: linux/amd64
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
            VCS_REF=${{ needs.prepare.outputs.build_ref }}

  build-app-arm64:
    name: Build App (arm64)
    needs: prepare
    runs-on: ubuntu-24.04-arm
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.build_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push App image (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.APP_IMAGE_NAME }}:${{ needs.prepare.outputs.version }}-arm64
          cache-from: type=gha,scope=app-arm64
          cache-to: type=gha,mode=max,scope=app-arm64
          platforms: linux/arm64
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
            VCS_REF=${{ needs.prepare.outputs.build_ref }}

  merge-app-manifest:
    name: Merge App Manifest
    needs: [prepare, build-app-amd64, build-app-arm64]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest for App
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          IMAGE="${{ env.REGISTRY }}/${{ env.APP_IMAGE_NAME }}"

          # Always tag the exact version. Floating tags (major/minor/latest) are
          # only updated for stable releases — a prerelease (version contains
          # '-', e.g. v1.2.0-rc1) must not overwrite them.
          TAGS=("${VERSION_NUM}")
          if [[ "$VERSION_NUM" != *-* ]]; then
            MAJOR=$(echo "$VERSION_NUM" | cut -d. -f1)
            MINOR=$(echo "$VERSION_NUM" | cut -d. -f1-2)
            TAGS+=("${MINOR}" "${MAJOR}" "latest")
          fi

          for TAG in "${TAGS[@]}"; do
            docker buildx imagetools create -t "${IMAGE}:${TAG}" \
              "${IMAGE}:${VERSION}-amd64" \
              "${IMAGE}:${VERSION}-arm64"
          done

  # ============================================================
  # API Image Builds
  # ============================================================
  build-api-amd64:
    name: Build API (amd64)
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.build_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image (amd64)
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ needs.prepare.outputs.version }}-amd64
          cache-from: type=gha,scope=api-amd64
          cache-to: type=gha,mode=max,scope=api-amd64
          platforms: linux/amd64
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
            VCS_REF=${{ needs.prepare.outputs.build_ref }}

  build-api-arm64:
    name: Build API (arm64)
    needs: prepare
    runs-on: ubuntu-24.04-arm
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.build_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image (arm64)
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}:${{ needs.prepare.outputs.version }}-arm64
          cache-from: type=gha,scope=api-arm64
          cache-to: type=gha,mode=max,scope=api-arm64
          platforms: linux/arm64
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
            VCS_REF=${{ needs.prepare.outputs.build_ref }}

  merge-api-manifest:
    name: Merge API Manifest
    needs: [prepare, build-api-amd64, build-api-arm64]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest for API
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          IMAGE="${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}"

          # Always tag the exact version. Floating tags (major/minor/latest) are
          # only updated for stable releases — a prerelease (version contains
          # '-', e.g. v1.2.0-rc1) must not overwrite them.
          TAGS=("${VERSION_NUM}")
          if [[ "$VERSION_NUM" != *-* ]]; then
            MAJOR=$(echo "$VERSION_NUM" | cut -d. -f1)
            MINOR=$(echo "$VERSION_NUM" | cut -d. -f1-2)
            TAGS+=("${MINOR}" "${MAJOR}" "latest")
          fi

          for TAG in "${TAGS[@]}"; do
            docker buildx imagetools create -t "${IMAGE}:${TAG}" \
              "${IMAGE}:${VERSION}-amd64" \
              "${IMAGE}:${VERSION}-arm64"
          done

  # ============================================================
  # GitHub Release
  # ============================================================
  release:
    name: Create GitHub Release
    needs: [prepare, merge-app-manifest, merge-api-manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.build_ref }}
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --pretty=format:"- %s (%h)" | head -50)
          else
            COMMITS=$(git log --oneline --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi
          
          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md
          echo "$COMMITS" >> changelog.md
          echo "" >> changelog.md
          echo "## Docker Images" >> changelog.md
          echo "" >> changelog.md
          echo "Pull the images from GitHub Container Registry:" >> changelog.md
          echo "" >> changelog.md
          echo "\`\`\`bash" >> changelog.md
          echo "docker pull ghcr.io/${{ github.repository }}/app:${VERSION_NUM}" >> changelog.md
          echo "docker pull ghcr.io/${{ github.repository }}/api:${VERSION_NUM}" >> changelog.md
          echo "\`\`\`" >> changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Release ${{ needs.prepare.outputs.version }}
          body_path: changelog.md
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
